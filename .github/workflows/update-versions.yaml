name: Update versions.md in Dynamic Plugins Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release-*"
    paths:
      - "backstage.json"
      - "packages/app/package.json"
      - "packages/backend/package.json"

jobs:
  update-versions-md:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.RHDH_GITHUB_APP_ID }}
          private-key: ${{ secrets.RHDH_GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"

      - name: Run update-versions-doc script
        run: node scripts/update-versions-doc.mjs docs/dynamic-plugins/versions.md "${{ github.ref_name }}"
        # Note: GITHUB_REPOSITORY is available as a default env var in the github runner

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "chore(docs): Update versions.md in dynamic plugin documentation"
          branch: chore/automated-update-versions-doc-${{ github.ref_name }}
          title: "chore(docs): [${{ github.ref_name }}] Update versions.md in dynamic plugin documentation"
          body: "Updates Version Compatibility Matrix in dynamic plugin documentation"
          labels: "documentation"
          signoff: true
          delete-branch: true
